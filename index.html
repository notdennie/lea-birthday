<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <title>Birthday Cake 🎂</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    canvas { display: block; position: fixed; top: 0; left: 0; width: 100%; height: 100%; }

    /* GIF overlay elements */
    .gif-overlay {
      position: fixed;
      pointer-events: none;
      border-radius: 12px;
      opacity: 0;
      transition: none;
      z-index: 5;
      object-fit: contain;
    }

        /* Subtitle */
    .subtitle-overlay {
      position: fixed;
      top: 13%;
      left: 50%;
      transform: translateX(-50%);
      font-family: Georgia, serif;
      font-size: 22px;
      color: #4a2c0b;
      text-shadow: 0 2px 8px rgba(255,240,180,0.9);
      opacity: 0;
      transition: opacity 1.2s ease-in;
      z-index: 6;
      pointer-events: none;
      text-align: center;
      white-space: nowrap;
    }

    #ui {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      z-index: 10;
    }
    #status-msg {
      font-family: Georgia, serif; font-size: 15px;
      color: rgba(255,220,150,0.9); text-align: center;
      text-shadow: 0 0 12px rgba(255,180,50,0.7);
    }
    .controls { display: flex; gap: 12px; }
    button {
      font-family: Georgia, serif; font-size: 13px;
      padding: 7px 18px; border-radius: 8px;
      border: 1px solid rgba(255,200,100,0.4);
      background: rgba(0,0,0,0.55); color: rgba(255,220,150,0.9);
      cursor: pointer; transition: background 0.15s;
    }
    button:hover { background: rgba(255,200,80,0.18); }
    #vol-display-row {
      font-family: Georgia, serif; font-size: 12px;
      color: rgba(255,200,100,0.5);
    }
  </style>
</head>

    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    let W, H, CX, CY;

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
      CX = W / 2; CY = H / 2;
    }
    window.addEventListener('resize', resize);
    resize();

    // ── GIF elements ──
    const gifs = Array.from(document.querySelectorAll('.gif-overlay'));

    function setGifOpacity(alpha) {
      gifs.forEach(g => { g.style.opacity = alpha; });
    }

    // ── Sound ──
    function playSounds() {
      ['snd-horn','snd-popper','snd-cheer'].forEach((id, i) => {
        const el = document.getElementById(id);
        if (!el) return;
        setTimeout(() => {
          el.currentTime = 0;
          el.play().catch(() => {});
        }, i * 180);
      });
    }

    // ── State ──
    let analyser, volume = 0;
    let candleOut = false, wishShown = false;
    let confetti = [], flameFlicker = 0, blowProgress = 0;
    let roomBrightness = 0;

    // ── Cake layout ──
    function cakeLayout() {
      const imgW = 500, imgH = 450;
      const dispH = H * 0.55;
      const scale = dispH / imgH;
      const dispW = imgW * scale;
      const imgX  = CX - dispW / 2;
      const imgY  = H  - dispH - H * 0.06;
      return { imgX, imgY, dispW, dispH, scale };
    }

    const CANDLE_TIPS = [
      { px: 222, py: 80 },
      { px: 252, py: 75 },
      { px: 278, py: 80 },
    ];

    function flameTips() {
      const { imgX, imgY, scale } = cakeLayout();
      return CANDLE_TIPS.map(c => ({
        x: imgX + c.px * scale,
        y: imgY + c.py * scale,
      }));
    }

    // ── Mic ──
    function startMic() {
      navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const source = audioCtx.createMediaStreamSource(stream);
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 256;
        source.connect(analyser);
        document.getElementById('mic-btn').textContent = '🎤 Mic On';
        document.getElementById('mic-btn').style.color = '#86efac';
      }).catch(() => {
      });
    }

    function getVolume() {
      if (!analyser) return 0;
      const data = new Uint8Array(analyser.frequencyBinCount);
      analyser.getByteFrequencyData(data);
      const avg = data.reduce((a, b) => a + b, 0) / data.length;
      return Math.min(100, Math.round(avg * 1.2));
    }

    function resetCandle() {
      candleOut = false; wishShown = false;
      confetti = []; blowProgress = 0; roomBrightness = 0;
      setGifOpacity(0);
    }

    function spawnConfetti() {
      const colors = ['#f72585','#7209b7','#3a86ff','#06d6a0','#ffd166','#ef476f','#118ab2','#ff9f1c'];
      for (let i = 0; i < 220; i++) {
        confetti.push({
          x: CX + (Math.random() - 0.5) * W * 0.7,
          y: H * 0.28,
          vx: (Math.random() - 0.5) * 18,
          vy: -(Math.random() * 15 + 5),
          color: colors[Math.floor(Math.random() * colors.length)],
          size: Math.random() * 11 + 5,
          rot: Math.random() * Math.PI * 2,
          rotV: (Math.random() - 0.5) * 0.35,
          gravity: 0.28 + Math.random() * 0.18,
          life: 1,
        });
      }
    }

    function lerp(a, b, t) { return a + (b - a) * Math.max(0, Math.min(1, t)); }

    function hexToRgb(hex) {
      return `${parseInt(hex.slice(1,3),16)},${parseInt(hex.slice(3,5),16)},${parseInt(hex.slice(5,7),16)}`;
    }

    function drawStreamers(alpha) {
      const cols = ['#f72585','#ffd166','#3a86ff','#06d6a0','#ff9f1c','#c084fc'];
      for (let i = 0; i < 14; i++) {
        const seed = i * 53.7, x0 = (seed * 43.1) % W;
        ctx.beginPath(); ctx.moveTo(x0, -10);
        for (let s = 0; s <= 30; s++) {
          const t = s / 30;
          ctx.lineTo(x0 + Math.sin(t * Math.PI * 3 + seed) * 28, t * H * 0.65);
        }
        ctx.strokeStyle = `rgba(${hexToRgb(cols[i%cols.length])},${alpha * 0.45})`;
        ctx.lineWidth = 3 + (i%3); ctx.stroke();
      }
    }

    function drawFlame(x, y, flicker, blowProg) {
      const wobble = Math.sin(flicker) * 1.5;
      const sY = 1 + Math.sin(flicker * 1.3) * 0.08;
      const bs  = 1 - blowProg * 0.7;
      const fs  = Math.min(W, H) / 520;

      ctx.save();
      ctx.translate(x + wobble * 0.5, y);
      ctx.scale(bs * fs, bs * fs);

      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.bezierCurveTo(-14+wobble,-15*sY, -10+wobble,-35*sY, 0,-44*sY);
      ctx.bezierCurveTo( 10+wobble,-35*sY,  14+wobble,-15*sY, 0,  0);
      const oG = ctx.createRadialGradient(0,-20,2, 0,-20,24);
      oG.addColorStop(0,'#fff7ed'); oG.addColorStop(0.3,'#fbbf24');
      oG.addColorStop(0.7,'#f97316'); oG.addColorStop(1,'rgba(239,68,68,0)');
      ctx.fillStyle = oG; ctx.fill();

      ctx.beginPath();
      ctx.moveTo(0,-2);
      ctx.bezierCurveTo(-6,-12*sY,-4,-26*sY,0,-32*sY);
      ctx.bezierCurveTo( 4,-26*sY, 6,-12*sY,0,-2);
      const iG = ctx.createRadialGradient(0,-15,1, 0,-15,16);
      iG.addColorStop(0,'#fffbeb'); iG.addColorStop(0.5,'#fde68a');
      iG.addColorStop(1,'rgba(251,191,36,0)');
      ctx.fillStyle = iG; ctx.fill();

      ctx.restore();
    }

    function drawSmoke(x, y) {
      for (let i = 0; i < 3; i++) {
        const t = (Date.now() * 0.001 + i * 0.7) % 3;
        ctx.beginPath();
        ctx.arc(x + Math.sin(t*2+i)*5, y - t*18, t*3+1, 0, Math.PI*2);
        ctx.fillStyle = `rgba(190,190,190,${0.28 - t*0.08})`;
        ctx.fill();
      }
    }

    // ── Main draw ──
    function drawScene() {
      ctx.clearRect(0, 0, W, H);
      const { imgX, imgY, dispW, dispH } = cakeLayout();

      // Background colour
      {
        const r = Math.round(lerp(8,  252, roomBrightness));
        const g = Math.round(lerp(5,  238, roomBrightness));
        const b = Math.round(lerp(12, 210, roomBrightness));
        ctx.fillStyle = `rgb(${r},${g},${b})`;
        ctx.fillRect(0, 0, W, H);
      }

      if (roomBrightness > 0.05) {
        const ceiling = ctx.createRadialGradient(CX,0,0, CX,0, H*0.7);
        ceiling.addColorStop(0, `rgba(255,245,210,${roomBrightness*0.7})`);
        ceiling.addColorStop(1, 'rgba(255,200,100,0)');
        ctx.fillStyle = ceiling; ctx.fillRect(0,0,W,H);

        const floorY = H * 0.82;
        ctx.fillStyle = `rgba(180,140,80,${roomBrightness*0.4})`;
        ctx.fillRect(0, floorY, W, H-floorY);
        ctx.fillStyle = `rgba(140,100,50,${roomBrightness*0.2})`;
        ctx.fillRect(0, 0, W, floorY);
        ctx.beginPath(); ctx.moveTo(0,floorY); ctx.lineTo(W,floorY);
        ctx.strokeStyle = `rgba(120,80,30,${roomBrightness*0.3})`;
        ctx.lineWidth = 2; ctx.stroke();

        if (roomBrightness > 0.25) drawStreamers(roomBrightness);
      }

      // Candle glow
      const gs = candleOut ? 0 : (1 - blowProgress * 0.65);
      if (gs > 0) {
        const tips = flameTips();
        const midTip = tips[1];
        const cg = ctx.createRadialGradient(midTip.x, midTip.y, 4, midTip.x, midTip.y+30, 280);
        cg.addColorStop(0, `rgba(255,210,70,${0.28*gs})`);
        cg.addColorStop(0.35, `rgba(255,140,20,${0.14*gs})`);
        cg.addColorStop(1, 'rgba(255,80,0,0)');
        ctx.fillStyle = cg; ctx.fillRect(0,0,W,H);
      }

      // Cake PNG
      if (cakeImg.complete && cakeImg.naturalWidth > 0) {
        ctx.drawImage(cakeImg, imgX, imgY, dispW, dispH);
      }

      // Darkness overlay
      const darkness = 1 - roomBrightness;
      if (darkness > 0.01) {
        ctx.fillStyle = `rgba(0,0,0,${darkness * 0.88})`;
        ctx.fillRect(0, 0, W, H);

        if (gs > 0) {
          const tips = flameTips();
          const midTip = tips[1];
          const pg = ctx.createRadialGradient(midTip.x, midTip.y, 3, midTip.x, midTip.y+25, 280);
          pg.addColorStop(0, `rgba(255,220,80,${0.65*gs*darkness})`);
          pg.addColorStop(0.15, `rgba(255,160,30,${0.45*gs*darkness})`);
          pg.addColorStop(0.4,  `rgba(255,80,0,${0.18*gs*darkness})`);
          pg.addColorStop(1, 'rgba(0,0,0,0)');
          ctx.fillStyle = pg; ctx.fillRect(0,0,W,H);
        }

        if (cakeImg.complete && cakeImg.naturalWidth > 0) {
          ctx.drawImage(cakeImg, imgX, imgY, dispW, dispH);
        }
      }

      // Flames / smoke
      const tips = flameTips();
      if (!candleOut) {
        flameFlicker += 0.15;
        tips.forEach(t => drawFlame(t.x, t.y, flameFlicker, blowProgress));
      } else {
        tips.forEach(t => drawSmoke(t.x, t.y));
      }

      // Confetti
      confetti.forEach(c => {
        c.x+=c.vx; c.y+=c.vy; c.vy+=c.gravity; c.vx*=0.99;
        c.rot+=c.rotV; c.life-=0.006;
        ctx.save();
        ctx.translate(c.x,c.y); ctx.rotate(c.rot);
        ctx.globalAlpha = Math.max(0,c.life);
        ctx.fillStyle = c.color;
        ctx.fillRect(-c.size/2,-c.size/2,c.size,c.size*0.55);
        ctx.restore();
      });
      confetti = confetti.filter(c => c.life > 0);

      // Happy Birthday text
      if (wishShown) {
        const t = Date.now()*0.003;
        const rainbow = ['#f72585','#ff9f1c','#3a86ff','#06d6a0','#ffd166'];
        const fs = Math.max(26, Math.min(58, W*0.065));
        ctx.save();
        ctx.font = `bold ${fs}px Georgia, serif`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.shadowColor = 'rgba(0,0,0,0.5)'; ctx.shadowBlur = 18;
        ctx.fillStyle = rainbow[Math.floor(t)%rainbow.length];
        ctx.fillText('🎂 Happy 20th Birthday Lea! 🎂', CX, H*0.09);
        ctx.restore();
      }

      // Sync GIF opacity with roomBrightness
      setGifOpacity(roomBrightness);

      const subtitle = document.getElementById('subtitle');
      if (subtitle) {
      subtitle.style.opacity = roomBrightness;
    }}

    function loop() {
      volume = getVolume();
      document.getElementById('vol-display').textContent = volume;

      if (!candleOut) {
        if (volume > 80) {
          blowProgress = Math.min(1, blowProgress + 0.02);
          if (blowProgress >= 1) {
            candleOut = true; blowProgress = 0;
            if (!wishShown) {
              wishShown = true;
              spawnConfetti();
              playSounds();
            }
          }
        } else {
          blowProgress = Math.max(0, blowProgress - 0.03);
        }
      }

      if (candleOut && roomBrightness < 1) {
        roomBrightness = Math.min(1, roomBrightness + 0.007);
      }

      drawScene();
      requestAnimationFrame(loop);
    }

    loop();
  </script>
</body>
</html>
